
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="preconnect" href="https://api.anam.ai" crossorigin />
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
      <!-- Fonts: discovered during initial HTML parse and loaded non-render-blocking
           (media=print flips to all on load). display=swap avoids invisible text. -->
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap"
        media="print"
        onload="this.media='all'"
      />
      <link
        rel="stylesheet"
        href="https://api.fontshare.com/v2/css?f[]=sharpie@400&display=swap"
        media="print"
        onload="this.media='all'"
      />
      <noscript>
        <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap"
        />
        <link
          rel="stylesheet"
          href="https://api.fontshare.com/v2/css?f[]=sharpie@400&display=swap"
        />
      </noscript>
      <!-- Anam SDK + media reach for these on session start; shave ~100–300ms off first frame. -->
      <link rel="preconnect" href="https://api.anam.ai" crossorigin />
      <link rel="dns-prefetch" href="https://api.anam.ai" />
      <link rel="dns-prefetch" href="https://res.cloudinary.com" />
      <link rel="dns-prefetch" href="https://www.youtube.com" />
      <title>Goblin Labs — The next decade of agents will look more like people.</title>
      <link rel="icon" href="/favicon.ico" sizes="32x32" />
      <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
      <link rel="icon" type="image/png" href="/favicon-192.png" sizes="192x192" />
      <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
      <meta name="description" content="Real-time AI personas that work your website: they talk to visitors, qualify them, capture leads, and book meetings. Not a chatbot. A face." />
      <meta property="og:title" content="Goblin Labs — Your website can talk now" />
      <meta property="og:description" content="Real-time AI personas that qualify visitors, capture leads, and book meetings. Talk to one right now — no signup." />
      <meta property="og:image" content="https://www.usegoblin.xyz/og.png" />
      <meta property="og:url" content="https://www.usegoblin.xyz" />
      <meta property="og:type" content="website" />
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:title" content="Goblin Labs — Your website can talk now" />
      <meta name="twitter:description" content="Real-time AI personas that qualify visitors, capture leads, and book meetings. Talk to one — no signup." />
      <meta name="twitter:image" content="https://www.usegoblin.xyz/og.png" />
      <meta name="description" content="Goblin Labs is an AI research lab building embodied, real-time AI personas that see your screen, talk with you, and act alongside you." />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      <!-- Self-service help widget — grounded search backed by the operator app (zendesk-ops) Help Center -->
      <script
        src="https://zendesk-ops.vercel.app/help-widget.js"
        data-endpoint="https://zendesk-ops.vercel.app/api/help"
        data-title="Help"
        data-accent="#030213"
        data-placeholder="Ask about Goblin Labs…"
      ></script>
    </body>
  </html>
